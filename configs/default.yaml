competition:
  slug: rogii-wellbore-geology-prediction

paths:
  raw_dir: data/raw/rogii-wellbore-geology-prediction
  processed_dir: data/processed
  model_dir: models
  output_dir: outputs
  submission_dir: submissions

data:
  max_wells:

validation:
  n_splits: 5
  random_state: 204

features:
  include_extra_numeric: false
  include_prefix_ncc: true
  include_typewell_beam: true

baseline:
  model: lightgbm
  target: residual_last_known
  prediction_mask: tvt_input_missing_with_target
  lgbm:
    n_estimators: 1000
    learning_rate: 0.02
    num_leaves: 63
    subsample: 0.85
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 5.0
    min_child_samples: 20
    verbosity: -1
    force_row_wise: true
    random_state: 204
    n_jobs: -1
