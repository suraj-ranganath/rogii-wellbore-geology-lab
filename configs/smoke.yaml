competition:
  slug: rogii-wellbore-geology-prediction

paths:
  raw_dir: data/raw/rogii-wellbore-geology-prediction
  processed_dir: data/processed
  model_dir: models
  output_dir: outputs
  submission_dir: submissions

data:
  max_wells: 30

validation:
  n_splits: 3
  random_state: 204

features:
  include_extra_numeric: false

baseline:
  model: lightgbm
  target: residual_last_known
  prediction_mask: tvt_input_missing_with_target
  lgbm:
    n_estimators: 100
    learning_rate: 0.05
    num_leaves: 31
    subsample: 0.9
    colsample_bytree: 0.85
    reg_alpha: 0.0
    reg_lambda: 5.0
    min_child_samples: 30
    verbosity: -1
    force_row_wise: true
    random_state: 204
    n_jobs: -1
